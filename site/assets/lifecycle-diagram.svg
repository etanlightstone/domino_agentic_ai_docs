<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 500" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10z" fill="#94A3B8"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10z" fill="#2563EB"/>
    </marker>
    <marker id="arr-dash" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10z" fill="#64748B"/>
    </marker>
    <filter id="sh" x="-2%" y="-4%" width="104%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.07"/>
    </filter>
    <clipPath id="c1"><rect x="70" y="318" width="185" height="82" rx="8"/></clipPath>
    <clipPath id="c2"><rect x="278" y="318" width="185" height="82" rx="8"/></clipPath>
    <clipPath id="c3"><rect x="486" y="318" width="185" height="82" rx="8"/></clipPath>
    <clipPath id="c4"><rect x="694" y="318" width="185" height="82" rx="8"/></clipPath>
  </defs>

  <!-- Title -->
  <text x="470" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0F172A" letter-spacing="-0.2">Agentic Development Lifecycle in Domino</text>

  <!-- WHAT YOU BUILD -->
  <text x="110" y="56" font-size="10" font-weight="700" fill="#94A3B8" letter-spacing="1.5">WHAT YOU BUILD</text>

  <!-- Agent Framework -->
  <g filter="url(#sh)">
    <rect x="110" y="68" width="210" height="86" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  </g>
  <text x="215" y="94" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">Agent Framework</text>
  <text x="215" y="112" text-anchor="middle" font-size="10.5" fill="#3B82F6">LangChain &#x00B7; Pydantic AI</text>
  <text x="215" y="126" text-anchor="middle" font-size="10.5" fill="#3B82F6">OpenAI Agents SDK &#x00B7; LlamaIndex</text>

  <line x1="328" y1="111" x2="358" y2="111" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Your Agent Logic -->
  <g filter="url(#sh)">
    <rect x="366" y="68" width="210" height="86" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  </g>
  <text x="471" y="94" text-anchor="middle" font-size="13" font-weight="700" fill="#5B21B6">Your Agent Logic</text>
  <text x="471" y="112" text-anchor="middle" font-size="10.5" fill="#7C3AED">Prompts &#x00B7; Tools &#x00B7; Memory</text>
  <text x="471" y="126" text-anchor="middle" font-size="10.5" fill="#7C3AED">Orchestration &#x00B7; Routing</text>

  <line x1="584" y1="111" x2="614" y2="111" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- LLM Endpoint -->
  <g filter="url(#sh)">
    <rect x="622" y="68" width="210" height="86" rx="8" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  </g>
  <text x="727" y="94" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">LLM Endpoint</text>
  <text x="727" y="112" text-anchor="middle" font-size="10.5" fill="#059669">Domino AI Gateway</text>
  <text x="727" y="126" text-anchor="middle" font-size="10.5" fill="#059669">Self-hosted / External API</text>

  <!-- @add_tracing connector -->
  <line x1="471" y1="162" x2="471" y2="216" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <rect x="411" y="176" width="120" height="24" rx="12" fill="#2563EB"/>
  <text x="471" y="192" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">@add_tracing</text>

  <!-- TRACES BAR -->
  <rect x="70" y="226" width="810" height="50" rx="8" fill="#0F172A"/>
  <text x="475" y="248" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="4">T R A C E S</text>
  <text x="475" y="265" text-anchor="middle" font-size="9" fill="#94A3B8">Every LLM call &#x00B7; tool invocation &#x00B7; decision point &#x00B7; token usage &#x00B7; latency &#x00B7; cost</text>

  <!-- Dashed connectors from TRACES to lifecycle boxes -->
  <line x1="162" y1="280" x2="162" y2="314" stroke="#2563EB" stroke-width="1" stroke-dasharray="3,2" opacity="0.3"/>
  <line x1="370" y1="280" x2="370" y2="314" stroke="#7C3AED" stroke-width="1" stroke-dasharray="3,2" opacity="0.3"/>
  <line x1="578" y1="280" x2="578" y2="314" stroke="#059669" stroke-width="1" stroke-dasharray="3,2" opacity="0.3"/>
  <line x1="786" y1="280" x2="786" y2="314" stroke="#EA580C" stroke-width="1" stroke-dasharray="3,2" opacity="0.3"/>

  <!-- DOMINO LIFECYCLE -->
  <text x="70" y="305" font-size="10" font-weight="700" fill="#94A3B8" letter-spacing="1.5">DOMINO LIFECYCLE</text>

  <!-- DEVELOP -->
  <g filter="url(#sh)">
    <g clip-path="url(#c1)">
      <rect x="70" y="318" width="185" height="82" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <rect x="70" y="318" width="185" height="4" fill="#2563EB"/>
    </g>
  </g>
  <text x="162" y="348" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">DEVELOP</text>
  <text x="162" y="366" text-anchor="middle" font-size="10.5" fill="#64748B">Instrument code</text>
  <text x="162" y="380" text-anchor="middle" font-size="10.5" fill="#64748B">Capture &amp; debug traces</text>

  <line x1="262" y1="359" x2="272" y2="359" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- EXPERIMENT -->
  <g filter="url(#sh)">
    <g clip-path="url(#c2)">
      <rect x="278" y="318" width="185" height="82" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <rect x="278" y="318" width="185" height="4" fill="#7C3AED"/>
    </g>
  </g>
  <text x="370" y="348" text-anchor="middle" font-size="13" font-weight="700" fill="#5B21B6">EXPERIMENT</text>
  <text x="370" y="366" text-anchor="middle" font-size="10.5" fill="#64748B">Evaluate quality</text>
  <text x="370" y="380" text-anchor="middle" font-size="10.5" fill="#64748B">Compare configurations</text>

  <line x1="470" y1="359" x2="480" y2="359" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DEPLOY -->
  <g filter="url(#sh)">
    <g clip-path="url(#c3)">
      <rect x="486" y="318" width="185" height="82" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <rect x="486" y="318" width="185" height="4" fill="#059669"/>
    </g>
  </g>
  <text x="578" y="348" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">DEPLOY</text>
  <text x="578" y="366" text-anchor="middle" font-size="10.5" fill="#64748B">Launch to production</text>
  <text x="578" y="380" text-anchor="middle" font-size="10.5" fill="#64748B">Auto trace collection</text>

  <line x1="678" y1="359" x2="688" y2="359" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MONITOR -->
  <g filter="url(#sh)">
    <g clip-path="url(#c4)">
      <rect x="694" y="318" width="185" height="82" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <rect x="694" y="318" width="185" height="4" fill="#EA580C"/>
    </g>
  </g>
  <text x="786" y="348" text-anchor="middle" font-size="13" font-weight="700" fill="#9A3412">MONITOR</text>
  <text x="786" y="366" text-anchor="middle" font-size="10.5" fill="#64748B">Track performance</text>
  <text x="786" y="380" text-anchor="middle" font-size="10.5" fill="#64748B">Continuous evaluation</text>

  <!-- Return arrow: MONITOR to DEVELOP -->
  <path d="M786,406 L786,436 L162,436 L162,406" fill="none" stroke="#64748B" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-dash)"/>
  <rect x="415" y="426" width="120" height="20" rx="10" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="475" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#64748B">iterate</text>

  <!-- Footer -->
  <text x="475" y="478" text-anchor="middle" font-size="10" fill="#CBD5E1">Same trace data powers every phase -- one abstraction from prototype to production</text>
</svg>
