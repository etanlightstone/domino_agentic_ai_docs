<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 510" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="grad-traces" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="grad-dev" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="grad-eval" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="grad-deploy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="grad-monitor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity=".08"/>
    </filter>
    <clipPath id="c1"><rect x="70" y="318" width="185" height="100" rx="8"/></clipPath>
    <clipPath id="c2"><rect x="278" y="318" width="185" height="100" rx="8"/></clipPath>
    <clipPath id="c3"><rect x="486" y="318" width="185" height="100" rx="8"/></clipPath>
    <clipPath id="c4"><rect x="694" y="318" width="185" height="100" rx="8"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="940" height="510" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="470" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a" letter-spacing=".3">Agentic Development Workflow in Domino</text>

  <!-- WHAT YOU BUILD section -->
  <text x="470" y="64" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1.5">WHAT YOU BUILD</text>

  <!-- Agent Framework box -->
  <rect x="130" y="80" width="180" height="56" rx="8" fill="#fff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text x="220" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Agent Framework</text>
  <text x="220" y="124" text-anchor="middle" font-size="9.5" fill="#64748b">LangChain &#x00B7; Pydantic AI &#x00B7; OpenAI</text>

  <!-- Arrow 1 -->
  <line x1="310" y1="108" x2="360" y2="108" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrowGrey)"/>

  <!-- Your Agent Logic box -->
  <rect x="360" y="80" width="220" height="56" rx="8" fill="#fff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text x="470" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Your Agent Logic</text>
  <text x="470" y="124" text-anchor="middle" font-size="9.5" fill="#64748b">Prompts &#x00B7; Tools &#x00B7; Memory &#x00B7; Routing</text>

  <!-- Arrow 2 -->
  <line x1="580" y1="108" x2="630" y2="108" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrowGrey)"/>

  <!-- LLM Endpoint box -->
  <rect x="630" y="80" width="180" height="56" rx="8" fill="#fff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text x="720" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">LLM Endpoint</text>
  <text x="720" y="124" text-anchor="middle" font-size="9.5" fill="#64748b">External API or Domino-hosted</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowGrey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowWhite" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fff"/>
    </marker>
  </defs>

  <!-- @add_tracing badge -->
  <rect x="358" y="152" width="224" height="28" rx="14" fill="#4f46e5"/>
  <text x="470" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#fff" font-family="'SF Mono','Fira Code',monospace">@add_tracing</text>

  <!-- Connector from badge to TRACES bar -->
  <line x1="470" y1="180" x2="470" y2="200" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- TRACES bar -->
  <rect x="70" y="200" width="800" height="40" rx="8" fill="url(#grad-traces)"/>
  <text x="470" y="226" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="2">TRACES</text>
  <text x="470" y="224" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.7)" dy="14">LLM calls &#x00B7; tool invocations &#x00B7; decisions &#x00B7; token usage &#x00B7; latency &#x00B7; cost</text>

  <!-- Connector from TRACES to lifecycle -->
  <line x1="470" y1="240" x2="470" y2="260" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- DOMINO WORKFLOW label -->
  <text x="470" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1.5">DOMINO WORKFLOW</text>

  <!-- Connecting lines from TRACES to each box -->
  <line x1="162" y1="260" x2="162" y2="318" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="370" y1="260" x2="370" y2="318" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="578" y1="260" x2="578" y2="318" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="786" y1="260" x2="786" y2="318" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ======= DEVELOP box ======= -->
  <g filter="url(#shadow)">
    <rect x="70" y="318" width="185" height="100" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <rect x="70" y="318" width="185" height="5" clip-path="url(#c1)" fill="url(#grad-dev)"/>
  </g>
  <text x="162" y="344" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2563eb">DEVELOP</text>
  <text x="162" y="358" text-anchor="middle" font-size="9.5" font-weight="500" fill="#64748b" font-style="italic">Domino Workspace</text>
  <text x="162" y="378" text-anchor="middle" font-size="10" fill="#475569">Write agent code</text>
  <text x="162" y="393" text-anchor="middle" font-size="10" fill="#475569">Add instrumentation</text>
  <text x="162" y="408" text-anchor="middle" font-size="10" fill="#475569">Prepare test data</text>

  <!-- Arrow dev to eval -->
  <line x1="255" y1="368" x2="278" y2="368" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGrey)"/>

  <!-- ======= EVALUATE box ======= -->
  <g filter="url(#shadow)">
    <rect x="278" y="318" width="185" height="100" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <rect x="278" y="318" width="185" height="5" clip-path="url(#c2)" fill="url(#grad-eval)"/>
  </g>
  <text x="370" y="344" text-anchor="middle" font-size="12.5" font-weight="700" fill="#d97706">EVALUATE</text>
  <text x="370" y="358" text-anchor="middle" font-size="9.5" font-weight="500" fill="#64748b" font-style="italic">Domino Jobs</text>
  <text x="370" y="378" text-anchor="middle" font-size="10" fill="#475569">Run eval script as Job</text>
  <text x="370" y="393" text-anchor="middle" font-size="10" fill="#475569">Creates experiment run</text>
  <text x="370" y="408" text-anchor="middle" font-size="10" fill="#475569">Traces + evaluations</text>

  <!-- Arrow eval to deploy -->
  <line x1="463" y1="368" x2="486" y2="368" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGrey)"/>

  <!-- ======= DEPLOY box ======= -->
  <g filter="url(#shadow)">
    <rect x="486" y="318" width="185" height="100" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <rect x="486" y="318" width="185" height="5" clip-path="url(#c3)" fill="url(#grad-deploy)"/>
  </g>
  <text x="578" y="344" text-anchor="middle" font-size="12.5" font-weight="700" fill="#059669">DEPLOY</text>
  <text x="578" y="358" text-anchor="middle" font-size="9.5" font-weight="500" fill="#64748b" font-style="italic">Experiment Manager + Agent Hosting</text>
  <text x="578" y="378" text-anchor="middle" font-size="10" fill="#475569">Compare runs + traces</text>
  <text x="578" y="393" text-anchor="middle" font-size="10" fill="#475569">Deploy as Domino Agent</text>
  <text x="578" y="408" text-anchor="middle" font-size="10" fill="#475569">Full lineage tracked</text>

  <!-- Arrow deploy to monitor -->
  <line x1="671" y1="368" x2="694" y2="368" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGrey)"/>

  <!-- ======= MONITOR box ======= -->
  <g filter="url(#shadow)">
    <rect x="694" y="318" width="185" height="100" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <rect x="694" y="318" width="185" height="5" clip-path="url(#c4)" fill="url(#grad-monitor)"/>
  </g>
  <text x="786" y="344" text-anchor="middle" font-size="12.5" font-weight="700" fill="#e11d48">MONITOR</text>
  <text x="786" y="358" text-anchor="middle" font-size="9.5" font-weight="500" fill="#64748b" font-style="italic">Agent Dashboard</text>
  <text x="786" y="378" text-anchor="middle" font-size="10" fill="#475569">Live user traces</text>
  <text x="786" y="393" text-anchor="middle" font-size="10" fill="#475569">Scheduled eval Jobs</text>
  <text x="786" y="408" text-anchor="middle" font-size="10" fill="#475569">Same instrumentation</text>

  <!-- Return / iterate arrow -->
  <path d="M786,418 L786,450 L162,450 L162,418" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrowGrey)"/>
  <rect x="420" y="440" width="100" height="20" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="470" y="454" text-anchor="middle" font-size="9.5" font-weight="600" fill="#64748b">iterate</text>

  <!-- Footer -->
  <text x="470" y="490" text-anchor="middle" font-size="9" fill="#94a3b8">One decorator instruments your code. The same trace data powers every phase.</text>
</svg>
